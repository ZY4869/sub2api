name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g., v1.0.0)"
        required: true
        type: string
      simple_release:
        description: "Simple release: only x86_64 GHCR image, skip other artifacts"
        required: false
        type: boolean
        default: false

env:
  SIMPLE_RELEASE: ${{ github.event.inputs.simple_release == 'true' || vars.SIMPLE_RELEASE == 'true' }}
  GOLANGCI_LINT_VERSION: v2.9
  GOVULNCHECK_VERSION: v1.1.4

permissions:
  contents: write
  packages: write

jobs:
  validate-release-source:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - name: Validate version files against tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG_NAME" ]; then
            echo "Release tag is required"
            exit 1
          fi
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Only final release tags are allowed (expected format: v1.2.3, got: $TAG_NAME)"
            exit 1
          fi
          VERSION="${TAG_NAME#v}"
          FILE_VERSION="$(tr -d '\r\n' < backend/cmd/server/VERSION)"
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "backend/cmd/server/VERSION=$FILE_VERSION does not match tag $TAG_NAME"
            exit 1
          fi
          EXPECTED_VERSION="$VERSION" python - <<'PY'
          import json
          import os
          import pathlib
          import sys

          expected = os.environ["EXPECTED_VERSION"]
          package_json = pathlib.Path("frontend/package.json")
          version = json.loads(package_json.read_text(encoding="utf-8")).get("version")
          if version != expected:
              print(f"frontend/package.json version {version!r} does not match {expected!r}", file=sys.stderr)
              sys.exit(1)
          PY
      - name: Ensure go mod tidy is clean
        shell: bash
        run: |
          go mod tidy -C backend
          git diff --exit-code -- backend/go.mod backend/go.sum

  release-preflight:
    needs: validate-release-source
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Run release gate checks
        run: bash scripts/verify-ci.sh release-gate
      - name: Upload release gate diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-diagnostics
          path: .cache/verify-ci
          if-no-files-found: ignore

  release:
    needs:
      - validate-release-source
      - release-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Build frontend release assets
        run: bash scripts/verify-ci.sh frontend-build
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Fetch tags with annotations
        run: git fetch --tags --force
      - name: Get tag message
        id: tag_message
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          echo "Processing tag: $TAG_NAME"
          TAG_MESSAGE="$(git tag -l --format='%(contents:body)' "$TAG_NAME")"
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          echo "$TAG_MESSAGE" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Set lowercase owner for GHCR
        id: lowercase
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --skip=validate ${{ env.SIMPLE_RELEASE == 'true' && '--config=.goreleaser.simple.yaml' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_MESSAGE: ${{ steps.tag_message.outputs.message }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_OWNER_LOWER: ${{ steps.lowercase.outputs.owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          DOCKERHUB_USERNAME: ${{ env.DOCKERHUB_USERNAME || 'skip' }}
      - name: Update DockerHub description
        if: ${{ env.SIMPLE_RELEASE != 'true' && env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/sub2api
          short-description: "Sub2API - AI API Gateway Platform"
          readme-filepath: ./deploy/DOCKER.md
      - name: Send Telegram Notification
        if: ${{ env.SIMPLE_RELEASE != 'true' }}
        continue-on-error: true
        shell: bash
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram credentials not configured, skipping notification"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ github.event.inputs.tag }}"
          else
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG_NAME#v}"
          REPO="${{ github.repository }}"
          GHCR_IMAGE="ghcr.io/${REPO,,}"

          TAG_MESSAGE='${{ steps.tag_message.outputs.message }}'
          TAG_MESSAGE="$(echo "$TAG_MESSAGE" | sed 's/\([_*`\[]\)/\\\1/g')"
          if [ ${#TAG_MESSAGE} -gt 3500 ]; then
            TAG_MESSAGE="${TAG_MESSAGE:0:3500}..."
          fi

          MESSAGE="Sub2API release published"$'\n'$'\n'
          MESSAGE+="Version: \`${VERSION}\`"$'\n'$'\n'
          if [ -n "$TAG_MESSAGE" ]; then
            MESSAGE+="${TAG_MESSAGE}"$'\n'$'\n'
          fi
          MESSAGE+="Docker pull commands:"$'\n'
          MESSAGE+="\`\`\`bash"$'\n'
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            DOCKER_IMAGE="${DOCKERHUB_USERNAME}/sub2api"
            MESSAGE+="# Docker Hub"$'\n'
            MESSAGE+="docker pull ${DOCKER_IMAGE}:${TAG_NAME}"$'\n'
            MESSAGE+="# GitHub Container Registry"$'\n'
          fi
          MESSAGE+="docker pull ${GHCR_IMAGE}:${TAG_NAME}"$'\n'
          MESSAGE+="\`\`\`"$'\n'$'\n'
          MESSAGE+="Related links:"$'\n'
          MESSAGE+="[GitHub Release](https://github.com/${REPO}/releases/tag/${TAG_NAME})"$'\n'
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            MESSAGE+="[Docker Hub](https://hub.docker.com/r/${DOCKER_IMAGE})"$'\n'
          fi
          MESSAGE+="[GitHub Packages](https://github.com/${REPO}/pkgs/container/sub2api)"$'\n'

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg chat_id "${TELEGRAM_CHAT_ID}" \
              --arg text "${MESSAGE}" \
              '{
                chat_id: $chat_id,
                text: $text,
                parse_mode: "Markdown",
                disable_web_page_preview: true
              }')"
