name: Tag Health

on:
  push:
    paths:
      - ".github/workflows/tag-health.yml"
      - ".github/workflows/release.yml"
      - "scripts/tag_health.py"
      - "scripts/verify_ci.py"
      - "scripts/verify-ci.sh"
  workflow_dispatch:
    inputs:
      tag_pattern:
        description: "Tag glob pattern"
        required: false
        type: string
        default: "v*"
      max_tags:
        description: "Max tags to scan, 0 means all"
        required: false
        type: string
        default: "0"
      profile:
        description: "Verification profile"
        required: false
        type: choice
        default: compile
        options:
          - compile
          - ci
          - release
      max_parallel:
        description: "Max parallel matrix jobs"
        required: false
        type: string
        default: "6"
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: read

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.tags.outputs.matrix }}
      count: ${{ steps.tags.outputs.count }}
      profile: ${{ steps.vars.outputs.profile }}
      max_parallel: ${{ steps.vars.outputs.max_parallel }}
      tag_pattern: ${{ steps.vars.outputs.tag_pattern }}
      max_tags: ${{ steps.vars.outputs.max_tags }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Fetch tags
        run: git fetch --tags --force
      - id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_PATTERN="${{ github.event.inputs.tag_pattern }}"
            MAX_TAGS="${{ github.event.inputs.max_tags }}"
            PROFILE="${{ github.event.inputs.profile }}"
            MAX_PARALLEL="${{ github.event.inputs.max_parallel }}"
          else
            TAG_PATTERN="v*"
            MAX_TAGS="0"
            PROFILE="compile"
            MAX_PARALLEL="6"
          fi
          echo "tag_pattern=$TAG_PATTERN" >> "$GITHUB_OUTPUT"
          echo "max_tags=$MAX_TAGS" >> "$GITHUB_OUTPUT"
          echo "profile=$PROFILE" >> "$GITHUB_OUTPUT"
          echo "max_parallel=$MAX_PARALLEL" >> "$GITHUB_OUTPUT"
      - id: tags
        shell: bash
        env:
          TAG_PATTERN: ${{ steps.vars.outputs.tag_pattern }}
          MAX_TAGS: ${{ steps.vars.outputs.max_tags }}
        run: |
          MATRIX="$(python scripts/tag_health.py list --pattern "$TAG_PATTERN" --max-tags "$MAX_TAGS" --format matrix)"
          COUNT="$(python scripts/tag_health.py list --pattern "$TAG_PATTERN" --max-tags "$MAX_TAGS" --format count)"
          {
            echo "matrix<<EOF"
            echo "$MATRIX"
            echo "EOF"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"
      - name: Append summary
        shell: bash
        run: |
          {
            echo "### Tag Health Plan"
            echo
            echo "- Pattern: \`${{ steps.vars.outputs.tag_pattern }}\`"
            echo "- Max tags: \`${{ steps.vars.outputs.max_tags }}\`"
            echo "- Profile: \`${{ steps.vars.outputs.profile }}\`"
            echo "- Selected tags: \`${{ steps.tags.outputs.count }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  verify-tag:
    needs: prepare-matrix
    if: needs.prepare-matrix.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(needs.prepare-matrix.outputs.max_parallel) }}
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    name: Verify ${{ matrix.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Verify tag
        run: python scripts/tag_health.py verify --tag "${{ matrix.tag }}" --profile "${{ needs.prepare-matrix.outputs.profile }}"
      - name: Upload tag report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tag-health-${{ matrix.tag }}
          path: .cache/tag-health/reports
          if-no-files-found: ignore
