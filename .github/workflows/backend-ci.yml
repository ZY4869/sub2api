name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: v2.9
  GOVULNCHECK_VERSION: v1.1.4

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - name: Run backend unit checks
        run: bash scripts/verify-ci.sh backend-unit

  backend-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - name: Run backend integration checks
        run: bash scripts/verify-ci.sh backend-integration
      - name: Upload backend integration log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-integration-log
          path: .cache/verify-ci/logs/backend-integration.log
          if-no-files-found: ignore

  backend-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - name: Run backend lint checks
        run: bash scripts/verify-ci.sh backend-lint

  backend-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum
      - name: Verify Go version
        run: go version | grep -q 'go1.26.2'
      - name: Run backend build checks
        run: bash scripts/verify-ci.sh backend-build

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: pnpm/action-setup@v5
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Run frontend build checks
        run: bash scripts/verify-ci.sh frontend-build
      - name: Run frontend test checks
        run: bash scripts/verify-ci.sh frontend-test
      - name: Run frontend lint checks
        run: bash scripts/verify-ci.sh frontend-lint
